<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23F04E2C'/></svg>">
    <title>The Association Project</title>
</head>
<body>
    <!-- Legacy modal ID stubs — kept for fallback getElementById calls, all hidden -->
    <!-- 26 zero-reference stubs removed 2026-03-25: seasonEndContent, playoffContent,
         collegeGradSubtitle/CapInfo/Tally, cg*(6), scoutTab*(4), aiProposal*(4),
         championshipPlayoff*(2), postGame*(2), expiringContractsList -->
    <div id="legacy-modal-stubs" style="display: none !important; position: absolute; width: 0; height: 0; overflow: hidden;">
      <!-- Team selection (4 refs) -->
      <div id="teamSelectionModal"></div>
      <div id="tier1Teams"></div>
      <div id="tier2Teams"></div>
      <div id="tier3Teams"></div>
      <!-- Season end (6 refs) -->
      <div id="seasonEndModal"></div>
      <!-- Playoff (1 ref in OffseasonController) -->
      <div id="playoffModal"></div>
      <!-- Roster (6 refs) -->
      <div id="rosterModal"></div>
      <div id="positionBreakdown"></div>
      <div id="rosterCount"></div>
      <div id="capStatus"></div>
      <div id="currentRoster"></div>
      <div id="positionFilter"></div>
      <div id="tierFilter"></div>
      <div id="freeAgentsList"></div>
      <!-- Development (3 refs) -->
      <div id="developmentModal"></div>
      <div id="developmentSummary"></div>
      <!-- Free Agency (4+ refs) -->
      <div id="freeAgencyModal"></div>
      <div id="faCapSpace"></div>
      <div id="faOfferTally"></div>
      <div id="faOfferCount"></div>
      <div id="faOfferTotal"></div>
      <div id="faOfferRemaining"></div>
      <div id="faCurrentRoster"></div>
      <div id="faPositionFilter"></div>
      <div id="freeAgencyPlayersList"></div>
      <div id="selectedOffersPanel"></div>
      <div id="offerCount"></div>
      <div id="offersList"></div>
      <div id="submitOffersBtn"></div>
      <div id="freeAgencyResultsModal"></div>
      <div id="freeAgencyResultsContent"></div>
      <!-- College Grad FA (1 ref in DraftController — needs migration) -->
      <div id="collegeGradFAModal"></div>
      <!-- Scouting (2 refs) -->
      <div id="scoutingModal"></div>
      <div id="watchlistCount"></div>
      <div id="scoutTabContent"></div>
      <!-- Draft (2+ refs) -->
      <div id="draftResultsModal"></div>
      <div id="draftRound1Btn"></div>
      <div id="draftCompBtn"></div>
      <div id="draftRound2Btn"></div>
      <div id="userPicksBtn"></div>
      <div id="draftResultsContent"></div>
      <!-- Bracket viewer (2 refs) -->
      <div id="bracketViewerModal"></div>
      <div id="bracketViewerContent"></div>
      <!-- Lottery / Draft pick (2 refs) -->
      <div id="lotteryModal"></div>
      <div id="lotteryContent"></div>
      <div id="userDraftPickModal"></div>
      <div id="userPickNumber"></div>
      <div id="draftPositionFilter"></div>
      <div id="draftSortBy"></div>
      <div id="draftProspectsList"></div>
      <div id="draftYourRoster"></div>
      <!-- Game container (active React root) -->
      <div id="gameContainer"></div>
      <!-- Watch game (3 refs) -->
      <div id="watchGameModal"></div>
      <div id="watchGameContent"></div>
      <!-- Box score (1 ref) -->
      <div id="boxScoreModal"></div>
      <div id="boxScoreContent"></div>
      <!-- Franchise history (1 ref) -->
      <div id="franchiseHistoryModal"></div>
      <div id="franchiseHistoryContent"></div>
      <!-- Compliance (3 refs) -->
      <div id="complianceModal"></div>
      <div id="complianceModalContent"></div>
      <!-- Injury (3 refs) -->
      <div id="injuryModal"></div>
      <div id="injuryDetails"></div>
      <div id="injuryOptions"></div>
      <div id="injuryConfirmBtn"></div>
      <!-- Calendar (1 ref) -->
      <div id="calendarModal"></div>
      <div id="calendarContent"></div>
      <!-- All-Star (2 refs) -->
      <div id="allStarModal"></div>
      <div id="allStarContent"></div>
      <!-- Contract decisions (1 ref) -->
      <div id="contractDecisionsModal"></div>
      <div id="contractDecisionsSummary"></div>
      <div id="contractDecisionsConfirmBtn"></div>
      <!-- Game menu (2 refs) -->
      <div id="gameMenuModal"></div>
    </div>
    
    <!-- React UI root -->
    <div id="react-root"></div>

    <!-- Game initialization script - defines window._initGame -->
    <script type="module" src="./game-init.js"></script>
    
    <!-- Main entry point - loads all modules via Vite -->
    <script type="module" src="./react/index.jsx"></script>
</body>
</html>
